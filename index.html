<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memory Match</title>
<style>
  :root {
    --bg: #163d24;
    --card-back: #4a3f8c;
    --card-front: #ffffff;
    --accent: #ff6f91;
    --accent2: #6fc3ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at top, #1f5c34, var(--bg));
    font-family: 'Trebuchet MS', sans-serif;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 16px;
  }
  h1 { margin: 0 0 4px; letter-spacing: 1px; }
  .subtitle { opacity: 0.7; margin-bottom: 18px; font-size: 14px; }
  .stats {
    display: flex;
    gap: 24px;
    margin-bottom: 20px;
    font-size: 15px;
  }
  .stats span { font-weight: bold; color: var(--accent2); }
  #board {
    display: grid;
    grid-template-columns: repeat(4, 80px);
    grid-gap: 12px;
  }
  .card {
    width: 80px;
    height: 80px;
    position: relative;
    cursor: pointer;
    perspective: 600px;
  }
  .card-inner {
    width: 100%;
    height: 100%;
    border-radius: 12px;
    transition: transform 0.4s;
    transform-style: preserve-3d;
    position: relative;
  }
  .card.flipped .card-inner, .card.matched .card-inner {
    transform: rotateY(180deg);
  }
  .face {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    backface-visibility: hidden;
  }
  .back {
    background: linear-gradient(135deg, var(--card-back), #2e275c);
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    color: #cfc8ff;
    font-size: 22px;
  }
  .front {
    background: var(--card-front);
    transform: rotateY(180deg);
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }
  .card.matched .front {
    background: #d8ffd8;
  }
  .card.matched {
    cursor: default;
  }
  #message {
    margin-top: 22px;
    font-size: 18px;
    min-height: 24px;
    color: var(--accent);
    font-weight: bold;
  }
  button#restart {
    margin-top: 14px;
    padding: 8px 18px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #1e1b2e;
    font-weight: bold;
    cursor: pointer;
    font-size: 14px;
  }
  button#restart:hover { background: var(--accent2); }
</style>
</head>
<body>
  <h1>🧠 Memory Match</h1>
  <div class="subtitle">Find all the pairs in as few moves as possible.</div>
  <div class="stats">
    <div>Moves: <span id="moves">0</span></div>
    <div>Pairs: <span id="pairs">0</span> / 8</div>
    <div>Time: <span id="timer">0</span>s</div>
  </div>
  <div id="board"></div>
  <div id="message"></div>
  <button id="restart">Restart</button>

<script>
const emojis = ['🍕','🚀','🐙','🌵','🎲','🎈','🦄','🍩'];
const board = document.getElementById('board');
const movesEl = document.getElementById('moves');
const pairsEl = document.getElementById('pairs');
const timerEl = document.getElementById('timer');
const messageEl = document.getElementById('message');
const restartBtn = document.getElementById('restart');

let cards = [];
let flipped = [];
let matchedCount = 0;
let moves = 0;
let lock = false;
let seconds = 0;
let timerInterval = null;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startTimer() {
  clearInterval(timerInterval);
  seconds = 0;
  timerEl.textContent = '0';
  timerInterval = setInterval(() => {
    seconds++;
    timerEl.textContent = seconds;
  }, 1000);
}

function init() {
  board.innerHTML = '';
  messageEl.textContent = '';
  matchedCount = 0;
  moves = 0;
  flipped = [];
  lock = false;
  movesEl.textContent = '0';
  pairsEl.textContent = '0';
  startTimer();

  const deck = shuffle([...emojis, ...emojis]);
  cards = deck.map((symbol, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.symbol = symbol;
    card.dataset.index = i;
    card.innerHTML = `
      <div class="card-inner">
        <div class="face back">?</div>
        <div class="face front">${symbol}</div>
      </div>`;
    card.addEventListener('click', () => onCardClick(card));
    board.appendChild(card);
    return card;
  });
}

function onCardClick(card) {
  if (lock || card.classList.contains('flipped') || card.classList.contains('matched')) return;

  card.classList.add('flipped');
  flipped.push(card);

  if (flipped.length === 2) {
    lock = true;
    moves++;
    movesEl.textContent = moves;
    const [a, b] = flipped;
    if (a.dataset.symbol === b.dataset.symbol) {
      a.classList.add('matched');
      b.classList.add('matched');
      matchedCount++;
      pairsEl.textContent = matchedCount;
      flipped = [];
      lock = false;
      if (matchedCount === emojis.length) {
        clearInterval(timerInterval);
        messageEl.textContent = `🎉 Solved in ${moves} moves and ${seconds}s!`;
      }
    } else {
      setTimeout(() => {
        a.classList.remove('flipped');
        b.classList.remove('flipped');
        flipped = [];
        lock = false;
      }, 700);
    }
  }
}

restartBtn.addEventListener('click', init);
init();
</script>
</body>
</html>
